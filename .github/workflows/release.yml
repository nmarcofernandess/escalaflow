name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
            solver-bin: escalaflow-solver
            mcp-bin: escalaflow-mcp
          - os: windows-latest
            platform: win
            solver-bin: escalaflow-solver.exe
            mcp-bin: escalaflow-mcp.exe

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build solver binary (PyInstaller)
        run: |
          pip install -r solver/requirements.txt
          cd solver
          pyinstaller escalaflow-solver.spec --distpath ../solver-bin/ --clean --noconfirm

      - name: Verify solver binary
        shell: bash
        run: |
          ls -la solver-bin/
          file solver-bin/${{ matrix.solver-bin }} || true

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install MCP server dependencies
        run: cd mcp-server && bun install

      - name: Build MCP binary
        shell: bash
        run: bun build --compile mcp-server/index.ts --outfile mcp-bin/${{ matrix.mcp-bin }}

      - name: Verify MCP binary
        shell: bash
        run: |
          ls -la mcp-bin/
          file mcp-bin/${{ matrix.mcp-bin }} || true

      - name: Install Node dependencies
        run: npm ci

      - name: Fix platform-specific rollup binding (Windows)
        if: runner.os == 'Windows'
        run: npm install @rollup/rollup-win32-x64-msvc --no-save

      - name: Build Electron app
        run: npm run build

      - name: Package (${{ matrix.platform }})
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --${{ matrix.platform }} --publish never

      - name: List dist output
        shell: bash
        run: ls -la dist/*.dmg dist/*.exe dist/*.blockmap dist/*.yml 2>/dev/null || ls -la dist/

      - name: Upload Mac DMG + ZIP
        if: matrix.platform == 'mac'
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          files: |
            dist/*.dmg
            dist/*.zip
            dist/*.blockmap
            dist/latest-mac.yml

      - name: Upload Windows installer
        if: matrix.platform == 'win'
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          files: |
            dist/*.exe
            dist/*.blockmap
            dist/latest.yml
