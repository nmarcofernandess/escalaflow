name: Release

# Dispara quando Marco faz: git tag v1.2.0 && git push --tags
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

# NOTA: Build Windows roda no CI automaticamente.
# Build Mac: Marco roda localmente (npm run release:mac) porque precisa do solver Python compilado.
jobs:
  release-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build & publish Windows
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run dist:win -- --publish always
