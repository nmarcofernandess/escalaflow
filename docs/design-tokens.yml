# EscalaFlow Design Tokens Reference
# Fonte unica de verdade para tipografia, cores semanticas e patterns de UI.
# Toda decisao de tamanho/cor deve bater com este arquivo.

# ============================================================================
# TIPOGRAFIA
# ============================================================================
# Escala Tailwind apenas. NUNCA usar text-[Npx] arbitrario.
# Menor tamanho permitido: text-xs (12px / 0.75rem)

typography:
  # Hierarquia de pagina
  kpi-hero:
    class: "text-2xl font-bold tabular-nums"
    usage: "Numeros grandes em stat cards (92%, pontuacao, contagem)"

  page-title:
    class: "text-lg font-semibold text-foreground"
    usage: "h2 de pagina, titulos de secao principal"

  section-title:
    class: "text-base font-semibold"
    usage: "CardTitle, titulos de card/sub-secao"

  subsection-title:
    class: "text-sm font-semibold text-foreground"
    usage: "h3 dentro de cards, grupo de campos em forms"

  # Conteudo
  body:
    class: "text-sm"
    usage: "Texto padrao, descricoes, labels de form"

  body-muted:
    class: "text-sm text-muted-foreground"
    usage: "Texto secundario, descricoes, dicas"

  # Tabelas
  table-header:
    class: "text-xs"
    usage: "TableHead — TODOS os headers de tabela"

  table-cell:
    class: "text-xs"
    usage: "TableCell — dados, numeros, texto em celulas"

  table-cell-primary:
    class: "text-xs font-medium"
    usage: "TableCell com nome/identificador principal"

  table-sublabel:
    class: "text-xs text-muted-foreground"
    usage: "Sublabel dentro de celula (ex: nome do contrato abaixo do nome)"

  # Micro elementos
  badge:
    class: "text-xs"
    usage: "Badges, tags, chips, contadores inline"

  badge-compact:
    class: "text-xs"
    usage: "Badges menores em contexto denso (grids, timelines)"

  hint:
    class: "text-xs text-muted-foreground"
    usage: "Helper text, instrucoes, notas de tolerancia"

  stat-label:
    class: "text-xs font-medium text-muted-foreground"
    usage: "Label abaixo do numero em stat cards"

  stat-sublabel:
    class: "text-xs text-muted-foreground"
    usage: "Nota adicional em stat cards (ex: '94% c/ tolerancia')"

# ============================================================================
# CORES SEMANTICAS
# ============================================================================
# 3 tokens semanticos alem do tema base:
#   - destructive (ja existe) → erro critico, delete, HARD violation
#   - warning (novo)          → aviso, SOFT violation, abaixo da meta
#   - success (novo)          → ok, meta atingida, pode oficializar
#
# Usar SEMPRE o token. NUNCA hardcodar amber-600/emerald-600 inline.

colors:
  destructive:
    token: "text-destructive"
    bg: "bg-destructive"
    when: "Erro critico, HARD violation, botao delete, acao irreversivel"
    icon: "XCircle"

  warning:
    token: "text-warning"
    bg: "bg-warning"
    when: "Aviso, SOFT violation, abaixo da meta, status pendente, rascunho"
    icon: "AlertTriangle"

  success:
    token: "text-success"
    bg: "bg-success"
    when: "OK, meta atingida, sem violacoes, pode oficializar, status ativo"
    icon: "CheckCircle2"

  neutral:
    token: "text-muted-foreground"
    bg: "bg-muted"
    when: "Texto secundario, labels, hints, inativo, arquivado"

# Variantes para backgrounds leves (badges, banners, cards de status)
color-variants:
  warning-muted:
    bg: "bg-warning/10"
    border: "border-warning/20"
    text: "text-warning"
    usage: "Badges de aviso, banners SOFT, cards de alerta"

  success-muted:
    bg: "bg-success/10"
    border: "border-success/20"
    text: "text-success"
    usage: "Badges de sucesso, banners OK, cards positivos"

  destructive-muted:
    bg: "bg-destructive/10"
    border: "border-destructive/20"
    text: "text-destructive"
    usage: "Badges criticos, banners HARD, cards de erro"

# ============================================================================
# PATTERNS DE UI
# ============================================================================

table:
  wrapper: "rounded-md border"
  header: "text-xs"              # TableHead sempre text-xs
  cell-padding: "py-2"           # Padding padrao de celulas
  cell-expanded: "py-3 px-4"     # Celula de detalhe expandida
  grid-cols: "depende do contexto, nunca misturar sm:grid-cols-2 e sm:grid-cols-3 na mesma pagina"

stat-card:
  container: "p-4"               # Card com padding
  number: "text-2xl font-bold tabular-nums [color-token]"
  label: "mt-1 text-xs font-medium text-muted-foreground"
  sublabel: "mt-0.5 text-xs text-muted-foreground"

toggle-card:
  container: "flex items-start justify-between rounded-md border p-3"
  title: "text-sm font-medium"
  description: "text-xs text-muted-foreground"
