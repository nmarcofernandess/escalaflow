appId: com.escalaflow.desktop
productName: EscalaFlow
directories:
  buildResources: resources
  output: dist
files:
  - 'out/**/*'
extraResources:
  - from: 'solver-bin/'
    to: 'solver-bin/'
    filter:
      - '**/*'
  - from: 'models/'
    to: 'models/'
    filter:
      - '**/*'
  - from: 'knowledge/'
    to: 'knowledge/'
    filter:
      - '**/*.md'
      - '**/*.json'
asarUnpack:
  - '**/*.node'
  - 'node_modules/node-llama-cpp/**/*'
mac:
  icon: icon.icns
  category: public.app-category.business
  identity: "-"
  target:
    - dmg
    - zip
  artifactName: '${productName}-${version}-${arch}.${ext}'
  notarize: false
dmg:
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: '/Applications'
    - x: 270
      y: 80
      type: file
      path: 'resources/LEIA ANTES DE INSTALAR.txt'
win:
  icon: icon.ico
  target:
    - target: nsis
      arch:
        - x64
  artifactName: '${productName}-Setup-${version}.${ext}'
linux:
  icon: icon.png
  target:
    - AppImage
  category: Office
  artifactName: '${productName}-${version}.${ext}'
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerIcon: icon.ico
  uninstallerIcon: icon.ico
publish:
  provider: github
  owner: nmarcofernandess
  repo: escalaflow
